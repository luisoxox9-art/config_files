-- Configuration settings: https://conky.cc/config_settings
conky.config = {
    alignment = 'middle_right',
    gap_x = 2,
    gap_y = 2,
    background = false,
    draw_borders = false,
    border_inner_margin = 1,
    border_outer_margin = 1,
    border_width = 1,
    cpu_avg_samples = 4,
    default_color = 'white',
    draw_outline = true,
    default_outline_color = 'black',
    draw_shades = false,
    default_shade_color = 'black',
    double_buffer = true,
    draw_graph_borders = false,
    font = 'FiraMono Nerd Font:size=14',
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 4,
    update_interval = 4.0,

    own_window_argb_visual = true,
    own_window_argb_value = 0,

    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'utility',
    own_window_hints = 'undecorated,sticky,below,skip_taskbar,skip_pager',

    extra_newline = false,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_wayland = false,
    out_to_x = true,

    no_buffers = true,
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

-- Variables: https://conky.cc/variables
conky.text = [[
${color}Uptime: $uptime_short

${color}CPU: ${color green}$cpu%
     ${freq_g}GHz
${color}GPU: ${color green}${exec cat /sys/class/drm/card1/device/gpu_busy_percent}%
${color}RAM: ${color green}$mem/$memmax
     $memperc%

${color}Swap: $swap/$swapmax
      $swapperc%
${color}Networking:
  ${color}Up: ${upspeed wlp2s0}
  Down: ${downspeed wlp2s0}
${color}File systems:
  ${color}${fs_used /}/${fs_size /}
${color}Processes: $processes
  ${color}Running: $running_processes
]]
